AWSTemplateFormatVersion: '2010-09-09'
Resources:

  GeoAIBucket:
    Type: AWS::S3::Bucket

  GeoAIECR:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: geoai-lgbm-group6-inference

  SageMakerExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sagemaker.amazonaws.com
            Action: sts:AssumeRole
